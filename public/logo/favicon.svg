<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E84D82"/>
      <stop offset="100%" stop-color="#9B7FD4"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Fundo -->
  <rect width="512" height="512" rx="115" fill="url(#bg)"/>
  <rect width="512" height="265" rx="115" fill="url(#shine)"/>
  <rect x="18" y="18" width="476" height="476" rx="100"
        fill="none" stroke="white" stroke-width="6" stroke-opacity="0.18"/>

  <!--
    S cursiva: desenhado como path de bezier orgânico
    — leve inclinação itálica
    — entrada com flourish no topo
    — saída suave na base
    — stroke duplo para profundidade (sombra + frente)
  -->

  <!-- camada de profundidade -->
  <path d="
    M 298,145
    C 332,117 348,104 316,99
    C 280,93  208,108 181,152
    C 154,196 173,234 217,252
    L 260,267
    C 306,282 345,312 333,358
    C 321,404 276,414 240,410
    C 204,406 176,389 173,364
  "
  fill="none"
  stroke="white" stroke-opacity="0.18"
  stroke-width="52"
  stroke-linecap="round"
  stroke-linejoin="round"/>

  <!-- S principal -->
  <path d="
    M 298,145
    C 332,117 348,104 316,99
    C 280,93  208,108 181,152
    C 154,196 173,234 217,252
    L 260,267
    C 306,282 345,312 333,358
    C 321,404 276,414 240,410
    C 204,406 176,389 173,364
  "
  fill="none"
  stroke="white"
  stroke-width="38"
  stroke-linecap="round"
  stroke-linejoin="round"/>

  <!-- Estrela superior direita -->
  <g transform="translate(386, 108) rotate(15)">
    <path d="M0,-22 L5,-5 L22,0 L5,5 L0,22 L-5,5 L-22,0 L-5,-5 Z"
          fill="white" opacity="0.88"/>
  </g>

  <!-- Pontinho inferior esquerdo -->
  <g transform="translate(118, 402) rotate(-8)">
    <path d="M0,-11 L2.5,-2.5 L11,0 L2.5,2.5 L0,11 L-2.5,2.5 L-11,0 L-2.5,-2.5 Z"
          fill="white" opacity="0.5"/>
  </g>
</svg>
